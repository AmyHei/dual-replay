# Shared defaults
seed: 42
num_orderings: 5
seeds: [42, 123, 456, 789, 1024]

# Debug config (Mac local)
debug:
  model_name: "prajjwal1/bert-tiny"
  num_domains: 3
  epochs_per_domain: 1
  batch_size: 8
  adapter_r: 16
  max_seq_len: 64
  domain_buffer_size: 50
  general_buffer_size: 200
  learning_rate: 5.0e-4
