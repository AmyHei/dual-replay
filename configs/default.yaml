  domain_replay_fraction: 0.10
  num_orderings: 1

# Fast proxy for autoresearch (bert-tiny, 5 domains, ~30s per experiment)
# Trends correlate with clinc150: if LR/warmup improves here, it improves there.
autoresearch:
  model_name: "prajjwal1/bert-tiny"
  num_domains: 5
  epochs_per_domain: 2
  batch_size: 16
  gradient_accumulation_steps: 1
  adapter_r: 16
  max_seq_len: 64
  domain_buffer_size: 50
  general_buffer_size: 200
  learning_rate: 5.0e-4
  warmup_ratio: 0.1
  replay_ratio: 0.20
  domain_replay_fraction: 0.10
  num_orderings: 1
  ewc_fisher_samples: 100
  ewc_lambda: 5000.0

# --- Per-benchmark bert-tiny proxies (class-incremental eval) ---
