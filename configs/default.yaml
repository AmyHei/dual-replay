# Shared defaults
seed: 42
num_orderings: 5
seeds: [42, 123, 456, 789, 1024]

# Debug config (Mac local)
debug:
  model_name: "prajjwal1/bert-tiny"
  num_domains: 3
  epochs_per_domain: 1
  batch_size: 8
  adapter_r: 16
  max_seq_len: 64
  domain_buffer_size: 50
  general_buffer_size: 200
  learning_rate: 5.0e-4
  replay_ratio: 0.20
  domain_replay_fraction: 0.10
  num_orderings: 1

# Fast proxy for autoresearch (bert-tiny, 5 domains, ~30s per experiment)
# Trends correlate with clinc150: if LR/warmup improves here, it improves there.
autoresearch:
  model_name: "prajjwal1/bert-tiny"
  num_domains: 5
  epochs_per_domain: 2
  batch_size: 16
  gradient_accumulation_steps: 1
  adapter_r: 16
  max_seq_len: 64
  domain_buffer_size: 50
  general_buffer_size: 200
  learning_rate: 5.0e-4
  warmup_ratio: 0.1
  replay_ratio: 0.20
  domain_replay_fraction: 0.10
  num_orderings: 1
  ewc_fisher_samples: 100
  ewc_lambda: 5000.0

# Full CLINC150 config (GPU or Mac Apple Silicon)
# Shared base — full-FT methods (sequential_ft, ewc, replay_only) use these directly.
# Adapter methods override learning_rate below (frozen base tolerates higher LR).
clinc150:
  model_name: "bert-large-uncased"
  num_domains: 15
  epochs_per_domain: 5
  batch_size: 8
  gradient_accumulation_steps: 4   # effective batch = 8*4 = 32
  adapter_r: 64
  max_seq_len: 128
  domain_buffer_size: 500            # tuned: 500 > 200 for replay coverage
  general_buffer_size: 1000
  learning_rate: 1.5e-5             # full-FT methods (scaled from autoresearch: 1e-4 ÷ 8)
  warmup_ratio: 0.15                # autoresearch found 0.15 > 0.1
  replay_ratio: 0.20
  domain_replay_fraction: 0.10
  num_orderings: 5
  ewc_fisher_samples: 500           # subset for Fisher computation (saves memory)
  ewc_lambda: 5000.0
  # Per-method overrides from autoresearch (381 experiments, scaled ÷8 for bert-large)
  # Applied by run_experiment.py based on method name
  method_overrides:
    sequential_ft:                     # best: F1=60.8, BWT=-40.4
      learning_rate: 5.0e-5
      warmup_ratio: 0.15
    ewc:                               # proxy: F1=51.2, lr=1e-4, warmup=0.1
      learning_rate: 3.0e-5            # standard BERT-large FT range
      warmup_ratio: 0.1
    replay_only:                       # proxy: F1=83.8, lr=5e-4, epochs=5
      learning_rate: 6.0e-5
      replay_ratio: 0.50              # more replay for class-incremental retention
    lora_only:                         # proxy: F1=36.7, lr=5e-4, adapter_r=4→scale to 64
      learning_rate: 6.0e-5
    lora_replay:                       # proxy: F1=63.2, lr=2e-3, epochs=5, replay=0.3
      learning_rate: 2.5e-4
      replay_ratio: 0.30
      warmup_ratio: 0.05
    o_lora:                            # proxy: F1=39.7, lr=1e-3, epochs=5
      learning_rate: 1.2e-4
    der:                               # proxy: F1=71.6, lr=2e-3, replay=0.3, warmup=0.15
      learning_rate: 2.5e-4
      replay_ratio: 0.30
      warmup_ratio: 0.15
    dual_replay:                       # proxy: F1=77.0, lr=5e-4, adapter_r=16, unfreeze=2/2
      learning_rate: 6.25e-5           # 5e-4 ÷ 8 (dim_tiny/dim_large)
      replay_ratio: 0.40               # original ratio, larger buffer provides variety
      warmup_ratio: 0.15
      unfreeze_top_k: 4                # 2/2 layers on tiny ≈ 4/24 on large (~17%)

# T5 config (Phase 3)
t5:
  model_name: "t5-base"
  num_domains: 15
  epochs_per_domain: 5
  batch_size: 16
  adapter_r: 64
  max_seq_len: 128
  domain_buffer_size: 200
  general_buffer_size: 1000
  learning_rate: 1.0e-4
  replay_ratio: 0.20
  domain_replay_fraction: 0.10
  num_orderings: 5
