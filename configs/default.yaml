# Legacy: 15-sub-domain CLINC150 (kept for archived experiments)
clinc150:
  model_name: "bert-base-uncased"
  num_domains: 15
  epochs_per_domain: 5
  batch_size: 8
  gradient_accumulation_steps: 4   # effective batch = 8*4 = 32
  adapter_r: 64
  max_seq_len: 128
  domain_buffer_size: 500            # tuned: 500 > 200 for replay coverage
  general_buffer_size: 1000
  learning_rate: 1.5e-5             # full-FT methods (scaled from autoresearch: 1e-4 ÷ 8)
  warmup_ratio: 0.15                # autoresearch found 0.15 > 0.1
  replay_ratio: 0.20
  domain_replay_fraction: 0.10
  num_orderings: 5
  ewc_fisher_samples: 500           # subset for Fisher computation (saves memory)
  ewc_lambda: 5000.0
  # Per-method overrides from autoresearch (381 experiments, scaled ÷8 for bert-large)
  # Applied by run_experiment.py based on method name
  method_overrides:
    sequential_ft:                     # best: F1=60.8, BWT=-40.4
      learning_rate: 5.0e-5
      warmup_ratio: 0.15
    ewc:                               # proxy Apr-16: F1=75.2 (lr=3e-4, warmup=0.2, lambda=100, fisher=500)
      learning_rate: 3.75e-5           # 3e-4 ÷ 8 (bert-tiny→bert-large)
      warmup_ratio: 0.2
      ewc_lambda: 100.0
      ewc_fisher_samples: 500
    replay_only:                       # proxy Apr-16: F1=96.3 (lr=8e-4, warmup=0.15, rr=0.3, buf=200, ep=5)
      learning_rate: 1.0e-4            # 8e-4 ÷ 8 (bert-tiny→bert-large)
      warmup_ratio: 0.15
      replay_ratio: 0.30
    lora_only:                         # proxy: F1=36.7, lr=5e-4, adapter_r=4→scale to 64
      learning_rate: 6.0e-5
    lora_replay:                       # proxy Apr-16: F1=93.0 (lr=2e-3, warmup=0.05, rr=0.3, adapter_r=4)
      learning_rate: 2.5e-4             # 2e-3 ÷ 8 (bert-tiny→bert-large)
      warmup_ratio: 0.05
      replay_ratio: 0.30
      adapter_r: 32                     # scaled from proxy 4 (same rule as dual_replay)
    o_lora:                            # proxy: F1=39.7, lr=1e-3, epochs=5
      learning_rate: 1.2e-4
    der:                               # proxy Apr-16: F1=71.6 (lr=2e-3, warmup=0.15, rr=0.3, adapter_r=4)
      learning_rate: 2.5e-4             # 2e-3 ÷ 8 (bert-tiny→bert-large)
      warmup_ratio: 0.15
      replay_ratio: 0.30
      adapter_r: 32                     # scaled from proxy 4 (same rule as dual_replay)
    dual_replay:                       # paper-canonical (Sec 4.1 + Table 3): 100% frozen, α=0.20, r_a=64
      learning_rate: 1.25e-4           # adapter-only LR on bert-large
      warmup_ratio: 0.15               # clinc150 default (autoresearch-tuned-for-taskinc value reverted)
      replay_ratio: 0.20               # paper Section 4.3 (α=0.20)
      adapter_r: 64                    # paper main config (proxy-tuned r=32 reverted)
      unfreeze_top_k: 0                # 100% base frozen — paper Table 3 shows it beats any unfreezing

